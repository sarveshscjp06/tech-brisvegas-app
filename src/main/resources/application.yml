server:
  port: 8080

spring:
  application:
    name: tech-brisvegas-app

  # ---------------------------------------------------------
  # Oracle Data Source Configuration
  # Update url/username/password for your environment, or
  # better, override via environment variables shown below.
  # ---------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@(description= (retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1522)(host=adb.ap-mumbai-1.oraclecloud.com))(connect_data=(service_name=ge9bf8133738252_brisvegasdb_high.adb.oraclecloud.com))(security=(ssl_server_dn_match=yes)))}
    username: ${DB_USERNAME:ADMIN}
    password: ${DB_PASSWORD:BrisVegas_2106_db}
    driver-class-name:  oracle.jdbc.replay.OracleConnectionPoolDataSourceImpl
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      idle-timeout: 30000
      pool-name: RegistrationHikariCP
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      # Use 'validate' or 'none' in production; 'update' is convenient for dev only
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ALWAYS

logging:
  level:
    root: INFO
    com.example.registration: DEBUG
    org.hibernate.SQL: DEBUG
